<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest SMP</title>

<!-- ICON -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background-image: linear-gradient(#000000c6, #000000e2), url(assets/backround.png);
  display: flex;
  align-items: center;
  justify-content: space-evenly;
  padding: 80px;
  color: white;
}

.logo {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 30px #008000;
}

.info {
  text-align: center;
}

.info h1 {
  font-size: 48px;
  font-weight: 500;
}

.info p {
  margin-top: 10px;
  color: #aaa;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.5;
}

.social {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.social a {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #2e9e44;
  box-shadow: 0 0 30px #008000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 22px;
  text-decoration: none;
  transition: 0.2s;
}

.social a:hover {
  background: #1f7a34;
  transform: scale(1.1);
}

.join {
  margin-top: 30px;
}

.join a {
  display: inline-block;
  background: #2e9e44;
  box-shadow: 0 0 30px #008000;
  padding: 16px 80px;
  border-radius: 40px;
  text-decoration: none;
  color: white;
  font-size: 20px;
  transition: 0.2s;
}

.join a:hover {
  background: #1f7a34;
  transform: scale(1.05);
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    justify-content: center;
    padding: 40px;
  }

  .logo {
    width: 180px;
    height: 180px;
    margin-bottom: 30px;
  }

  .info h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<!-- KIRI -->
<img src="assets/logo.jpeg" class="logo">

<!-- KANAN -->
<div class="info">
  <h1>ForestSMP</h1>
  <p>Forest SMP adalah server Survival Economy dengan nuansa vanilla yang seru dan santai. Bangun, eksplorasi, dan berkembang bersama komunitas.</p>

  <div class="social">
    <a href="https://discord.gg/QtZjWh9h53"><i class="fab fa-discord"></i></a>
    <a href="https://chat.whatsapp.com/JTHzKLAwajwBp8Tsb9GnSp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@forestsmp_?_r=1&_t=ZS-95evpewOqjy"><i class="fab fa-tiktok"></i></a>
  </div>

  <div class="join">
    <a href="minecraft://?addExternalServer=ForestSMP|play.forestsmp.my.id:25212">
      Join Server
    </a>
  </div>
</div>

</body>
</html>
