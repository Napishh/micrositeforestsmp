<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForestSMP</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1fe800, #157f00);
    color: #ffffff;
  }

  .container {
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    background: #06ae00d9;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px #00000080;
    max-width: 400px;
    width: 90%;
  }

  img {
    width: 120px; 
    height: 120px; 
    border-radius: 50%; 
    box-shadow: 0 1px 33px #00000080;
    object-fit: cover;

    margin-bottom: 10px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 5px;
    color: #ffffff;
  }

  p {
    font-size: 14px;
    color: #ffffff;
    margin-bottom: 25px;
  }

  .btn {
    display: block;
    text-decoration: none;
    background: #058c00cc;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    color: #ffffff;
    font-weight: bold;
    transition: 0.2s;
  }

  .btn:hover {
    background: #028d00;
    transform: scale(1.05);
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #ffffff;
  }
</style>
</head>
<body>
  <div class="container">
    <img src="assets/New Logo Pores.jpeg" alt="">
    <h1>Forest SMP</h1>
    <p>New Release Server Minecraft </p>

    <a href="https://discord.gg/QtZjWh9h53" class="btn">Discord</a>
    <a href="" class="btn">WhatsApp Group</a>
    <a href="#" class="btn">Tiktok</a>

    <div class="footer">
      <p>Join ke Discord untuk mendapatkan informasi lengkap seputar server</p>
    </div>
</body>
</html>
